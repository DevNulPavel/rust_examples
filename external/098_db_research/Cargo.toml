[workspace]
members = ["parser", "arachne-client", "arachne-server", "arachne-api", "arctl"]
resolver = "3"

[workspace.dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_bytes = "0.11"
chrono = "0.4.44"
rmp-serde = "1.3.1"
smol_str = { version = "0.3.6", features = ["serde", "std"] }
tarpc = { version = "0.37.0", features = [
    "tokio1",
    "tcp",
    "unix",
    "serde-transport",
] }
tokio = { version = "1.51.1", features = [
    "macros",
    "rt-multi-thread",
    "signal",
    "io-util",
], default-features = false }
clap = { version = "4.6", features = ["derive"] }
anyhow = "1"

[profile.release]
debug = true
