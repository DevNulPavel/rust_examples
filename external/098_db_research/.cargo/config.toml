# Описание работы с собственными Registry
# - https://doc.rust-lang.org/cargo/reference/registries.html
# - https://doc.rust-lang.org/cargo/reference/config.html
# - https://doc.rust-lang.org/cargo/reference/publishing.html

######################################################################

[net]
git-fetch-with-cli = true # Помогает с нестандартными git зависимостями


######################################################################

# Флаги сборки x86_64
[target.'cfg(target_arch = "x86_64")']
rustflags = ["-C", "target-cpu=native", "--cfg", "tokio_unstable"]

# Флаги сборки aarch64
[target.'cfg(target_arch = "aarch64")']
rustflags = ["-C", "target-cpu=native", "--cfg", "tokio_unstable"]

################################################################################

# Общие флаги сборки.
# TODO: Но не понятно, надо ли здесь прописывать, если есть для конкретных таргетов уже
[build]
rustflags = ["--cfg", "tokio_unstable"]
